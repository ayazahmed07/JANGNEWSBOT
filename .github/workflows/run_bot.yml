name: Continuous PSXBOT Bot

on:
  workflow_dispatch:  # manual trigger to start the bot

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # skip Node.js 20 warnings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run bot.py continuously
        run: |
          echo "Starting bot.py..."
          # Run in background so the workflow step doesn't block
          nohup python bot.py > bot.log 2>&1 &
          echo "bot.py is running in background. Logs are in bot.log"